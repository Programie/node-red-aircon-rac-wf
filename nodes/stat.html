<script type="text/javascript">

        operatorId: {

        deviceId: {

        name: {

            required: false
        }
    };

    RED.nodes.registerType("mitsubishi-aircon-getstat", {
        category: "mitsubishi-aircon",
        paletteLabel: "getstat",
        color: "#ff9b9b",
        icon: "font-awesome/fa-sign-out",
        defaults: defaults,
        inputs: 1,
        outputs: 1,
        label: function () {
            return this.name || this.host || "getstat";

        labelStyle: function () {
            return this.name ? "node_label_italic" : "";

    RED.nodes.registerType("mitsubishi-aircon-setstat", {

        },
        labelStyle: function () {
            return this.name ? "node_label_italic" : "";
        }
    });
</script>
